<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Autor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="container mt-5">

    <div class="mb-4">
        <h1 class="fw-bold" th:text="${id == null ? 'Novo Autor' : 'Editar Autor'}"></h1>
        <p class="text-muted">Cadastre um novo autor no sistema.</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form th:action="${id == null} ? @{/autores} : @{/autores/{id}(id=${id})}"
                  th:object="${autor}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" th:field="*{nome}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nacionalidade</label>
                    <input type="text" class="form-control" th:field="*{nacionalidade}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ano de Nascimento</label>
                    <input type="number" class="form-control" th:field="*{anoNascimento}" required>
                </div>

                <button type="submit" class="btn btn-primary">Salvar</button>
                <a th:href="@{/autores}" class="btn btn-outline-secondary">Cancelar</a>

            </form>

        </div>
    </div>

</main>

</body>
</html>
