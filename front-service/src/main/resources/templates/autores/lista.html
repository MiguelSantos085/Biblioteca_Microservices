<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Autores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="container mt-5">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Autores</h1>
            <p class="text-muted">Lista de autores cadastrados no sistema.</p>
        </div>

        <a th:href="@{/autores/novo}" class="btn btn-primary">
            + Novo Autor
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form th:action="@{/autores}" method="get" class="row g-2 mb-4">
                <div class="col-md-10">
                    <input type="text"
                           name="nome"
                           class="form-control"
                           placeholder="Pesquisar autor por nome"
                           th:value="${nome}">
                </div>

                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-outline-primary">
                        Pesquisar
                    </button>
                </div>
            </form>

            <table class="table table-striped table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Nacionalidade</th>
                    <th>Ano de Nascimento</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="autor : ${autores}">
                    <td th:text="${autor.id}"></td>
                    <td th:text="${autor.nome}"></td>
                    <td th:text="${autor.nacionalidade}"></td>
                    <td th:text="${autor.anoNascimento}"></td>
                    <td class="text-end">
                        <a th:href="@{/autores/{id}/editar(id=${autor.id})}"
                           class="btn btn-sm btn-warning">
                            Editar
                        </a>
                        <form th:action="@{/autores/{id}/excluir(id=${autor.id})}"
                              method="post"
                              class="d-inline"
                              onsubmit="return confirm('Tem certeza que deseja excluir este autor?');">

                            <button type="submit" class="btn btn-sm btn-danger">
                                Excluir
                            </button>
                        </form>                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(autores)}" class="alert alert-info mt-3">
                Nenhum autor cadastrado.
            </div>

        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/}" class="btn btn-outline-secondary">
            Voltar
        </a>
    </div>

</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
