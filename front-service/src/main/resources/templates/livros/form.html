<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Livro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="container mt-5">

    <div class="mb-4">
        <h1 class="fw-bold"
            th:text="${id == null ? 'Novo Livro' : 'Editar Livro'}">
        </h1>
        <p class="text-muted">Cadastre um novo livro no sistema.</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form th:action="${formAction}"
                    th:object="${livro}"
                    method="post">

                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" class="form-control" th:field="*{titulo}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Gênero</label>
                    <input type="text" class="form-control" th:field="*{genero}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ano de Publicação</label>
                    <input type="number" class="form-control" th:field="*{anoPublicado}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Autor</label>
                    <select class="form-select" th:field="*{autorId}" required>
                        <option value="">Selecione um autor</option>
                        <option th:each="autor : ${autores}"
                                th:value="${autor.id}"
                                th:text="${autor.nome}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success">Salvar</button>
                <a th:href="@{/livros}" class="btn btn-outline-secondary">Cancelar</a>

            </form>

        </div>
    </div>

</main>

</body>
</html>
