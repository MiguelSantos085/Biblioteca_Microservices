<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Livros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="container mt-5">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Livros</h1>
            <p class="text-muted">Lista de livros cadastrados no sistema.</p>
        </div>

        <a th:href="@{/livros/novo}" class="btn btn-success">
            + Novo Livro
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form th:action="@{/livros}" method="get">

                <div class="row mb-4">

                    <div class="col-md-6">
                        <input class="form-control"
                               type="text"
                               name="titulo"
                               placeholder="Pesquisar por título"
                               th:value="${titulo}">
                    </div>

                    <div class="col-md-3">

                        <select class="form-select" name="disponivel">

                            <option value="">Todos</option>

                            <option value="true"
                                    th:selected="${disponivel == true}">
                                Disponíveis
                            </option>

                            <option value="false"
                                    th:selected="${disponivel == false}">
                                Indisponíveis
                            </option>

                        </select>

                    </div>

                    <div class="col-md-3 d-grid">

                        <button class="btn btn-primary">

                            Pesquisar

                        </button>

                    </div>

                </div>

            </form>

            <table class="table table-striped table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                    <th>Autor ID</th>
                    <th>Disponível</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="livro : ${livros}">
                    <td th:text="${livro.id}"></td>
                    <td th:text="${livro.titulo}"></td>
                    <td th:text="${livro.genero}"></td>
                    <td th:text="${livro.anoPublicado}"></td>
                    <td th:text="${livro.autorId}"></td>
                    <td>
                        <span th:if="${livro.disponivel}" class="badge bg-success">Sim</span>
                        <span th:if="${!livro.disponivel}" class="badge bg-danger">Não</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/livros/{id}/editar(id=${livro.id})}"
                           class="btn btn-sm btn-warning">
                            Editar
                        </a>
                        <form th:action="@{/livros/{id}/excluir(id=${livro.id})}"
                              method="post"
                              class="d-inline"
                              onsubmit="return confirm('Deseja excluir este livro?')">

                            <button class="btn btn-sm btn-danger">
                                Excluir
                            </button>

                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(livros)}" class="alert alert-info mt-3">
                Nenhum livro cadastrado.
            </div>

        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/}" class="btn btn-outline-secondary">
            Voltar
        </a>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
