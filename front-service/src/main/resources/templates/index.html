<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Biblioteca Microservices</a>
    </div>
</nav>

<main class="container mt-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Sistema de Biblioteca</h1>
        <p class="text-muted">
            Gerencie autores e livros consumindo microsserviços Spring Boot.
        </p>
    </div>

    <div class="row justify-content-center g-4">

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h3 class="card-title">Autores</h3>
                    <p class="card-text text-muted">
                        Cadastre, liste, edite e remova autores.
                    </p>
                    <a th:href="@{/autores}" class="btn btn-primary">
                        Gerenciar Autores
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h3 class="card-title">Livros</h3>
                    <p class="card-text text-muted">
                        Cadastre livros e controle disponibilidade.
                    </p>
                    <a th:href="@{/livros}" class="btn btn-success">
                        Gerenciar Livros
                    </a>
                </div>
            </div>
        </div>

    </div>

</main>

</body>
</html>
